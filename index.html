<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tatu Viagens - Contato</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <div class="logo-area">
      <img src="tatu_viagens_logo2.png" alt="Tatu Viagens Logo" class="logo" />
    </div>

    <h1 class="titulo">ENTRE EM CONTATO CONOSCO:</h1>

    <div class="campos">
      <div class="campo-bloco">
        <input type="text" class="campo" placeholder="SEU NOME" />
      </div>
      <div class="campo-bloco">
        <input type="email" class="campo" placeholder="SEU E-MAIL" />
      </div>
      <div class="campo-bloco">
        <input type="tel" class="campo" placeholder="SEU NÚMERO DE CELULAR" />
      </div>
    </div>

  </div>
</body>
</html>
